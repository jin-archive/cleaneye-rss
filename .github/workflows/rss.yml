name: Generate Cleaneye Job RSS

on:
  schedule:
    # 매일 한국시간 오전 9시, 오후 6시 (UTC 기준 0시, 9시) 작동
    - cron: '0 0,9 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 가져오기 (Checkout)
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 파이썬 크롤링 스크립트 실행
      run: python main.py

    - name: 결과물(RSS 파일) 커밋 및 푸시
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add rss.xml
        
        # 파일이 변경되었을 때만 푸시를 진행합니다.
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Cleaneye RSS feed" && git push)
