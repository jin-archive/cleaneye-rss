name: Generate Cleaneye Job RSS

on:
  schedule:
    - cron: '0 0,9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Selenium 구동을 위해 서버에 Chrome 브라우저 설치
    - name: 브라우저 환경 구성
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 필요 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 파이썬 스크립트 실행
      run: python main.py

    - name: 결과물 커밋 및 푸시
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add rss.xml
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Cleaneye RSS feed" && git push)
